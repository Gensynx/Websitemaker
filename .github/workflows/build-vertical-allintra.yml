name: Re-encode uploaded vertical (all-intra)

# One-shot helper: re-encodes the committed vertical clip to all-intra (a
# keyframe on every frame) at 720px wide, preserving its portrait aspect, so
# scroll-scrubbing on phones seeks to any position and decodes a single frame
# instantly (no choppiness). Triggered by pushing this workflow file; the
# in-workflow commit uses GITHUB_TOKEN, which does not re-trigger runs.

on:
  push:
    branches:
      - claude/darulamir-redesign-hyz302
    paths:
      - .github/workflows/build-vertical-allintra.yml

permissions:
  contents: write

jobs:
  reencode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq ffmpeg
          fi
          ffmpeg -version | head -1

      - name: Inspect source
        run: |
          set -euo pipefail
          echo "Source size: $(stat -c%s assets/darulamir-intro-vertical.mp4) bytes"
          ffprobe -v error -select_streams v:0 \
            -show_entries stream=width,height,r_frame_rate,codec_name,nb_frames \
            -show_entries format=duration -of default=noprint_wrappers=1 \
            assets/darulamir-intro-vertical.mp4

      - name: Re-encode all-intra (720 wide, keep aspect)
        run: |
          set -euo pipefail
          LIMIT=95000000
          cp assets/darulamir-intro-vertical.mp4 src.mp4
          encode() {
            local crf="$1"
            # scale to 720 wide, height auto/even -> preserves the clip's own
            # portrait ratio. keyint=1 makes every frame a keyframe. -an: muted.
            ffmpeg -y -loglevel error -i src.mp4 \
              -vf "scale=720:-2:flags=lanczos" \
              -c:v libx264 -preset slow -crf "$crf" \
              -x264-params "keyint=1:min-keyint=1:scenecut=0" \
              -pix_fmt yuv420p -movflags +faststart -an out.mp4
          }
          for crf in 20 22 24 26; do
            encode "$crf"
            SIZE=$(stat -c%s out.mp4)
            echo "CRF $crf -> $SIZE bytes"
            if [ "$SIZE" -le "$LIMIT" ]; then
              echo "Accepted at CRF $crf ($SIZE bytes)"
              break
            fi
          done
          echo "== final =="
          ffprobe -v error -select_streams v:0 \
            -show_entries stream=width,height,nb_frames -of default=noprint_wrappers=1 out.mp4
          echo "Final size: $(stat -c%s out.mp4) bytes"
          mv out.mp4 assets/darulamir-intro-vertical.mp4
          rm -f src.mp4

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/darulamir-intro-vertical.mp4; then
            echo "No change to commit"
            exit 0
          fi
          NEWSIZE=$(stat -c%s assets/darulamir-intro-vertical.mp4)
          git add assets/darulamir-intro-vertical.mp4
          git commit -m "Re-encode uploaded vertical to all-intra for smooth mobile scrub (${NEWSIZE} bytes)"
          git push
